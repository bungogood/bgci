games = 100
seed = 42
max_plies = 512
swap_sides = true
variant = "backgammon"
log = "info"
output_csv = "artifacts/duels/pubeval-vs-random/results.csv"
trace_games_dir = "artifacts/duels/pubeval-vs-random/games"

[engine_a]
name = "pubeval"
command = ["cargo", "run", "--quiet", "--bin", "pubeval_engine"]

[engine_b]
name = "random"
command = ["cargo", "run", "--quiet", "--bin", "random_engine"]
